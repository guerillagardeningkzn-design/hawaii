<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hawaii Zoomable Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0a3d62; /* Ocean blue – fills dead space around portrait map */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 540px;   /* Typical phone portrait width – adjust if your images are wider */
            max-height: 960px;  /* Enforces portrait feel */
            background-color: #0a3d62; /* Matches body – no white gaps */
            border: 12px solid #0a3d62; /* Thick border to extend color into dead space */
            border-radius: 16px; /* Optional: soft corners like a phone screen */
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.6); /* Optional depth */
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps aspect ratio, centers map */
        }
        polygon {
            fill: transparent;
            stroke: rgba(255, 60, 60, 0.7); /* Visible red outline, semi-transparent */
            stroke-width: 3;
            cursor: pointer;
            transition: fill 0.2s;
        }
        polygon:hover {
            fill: rgba(255, 60, 60, 0.15);
        }
        #back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            padding: 12px 24px;
            background-color: rgba(0, 123, 255, 0.85);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: none;
        }
        #back-button:hover {
            background-color: rgba(0, 86, 179, 0.95);
        }
    </style>
</head>
<body>
    <div id="map-container">
        <button id="back-button">Back</button>
        <svg id="map-svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <script>
    let maps = [];  // Populated dynamically from Google Sheets via Apps Script
    let currentLevel = 0;
    const svg = document.getElementById('map-svg');
    const backButton = document.getElementById('back-button');

    // ←←← REPLACE THIS WITH YOUR ACTUAL APPS SCRIPT WEB APP URL ←←←
    const apiUrl = 'https://script.google.com/macros/s/AKfycbygjXQ023r358utfU_3UhVQDDN3vOWnahjY_Gs6mpubRbs5l-oZECpy7pt0lUPWpvLK/exec';

    async function loadMapData() {
        try {
            const response = await fetch(apiUrl, {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache',  // Ensures you get fresh data after Sheet edits
                redirect: 'follow'
            });

            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            maps = await response.json();

            if (!Array.isArray(maps) || maps.length === 0) {
                throw new Error('Invalid map data format');
            }

            renderMap(0);  // Start with level 0 after successful load
        } catch (error) {
            console.error('Failed to load map data from Google Sheets:', error);

            // Fallback: hardcoded original data (safe backup)
            maps = [
                {
                    url: 'images/island_map.jpg',
                    regions: [
                        { points: '80,520 520,520 520,760 320,800 80,720', nextLevel: 1 }
                        // Add more regions here if needed for fallback
                    ]
                },
                {
                    url: 'images/gulf_coast.jpg',
                    regions: [
                        { points: '180,420 420,420 420,620 320,670 180,620', nextLevel: 2 }
                    ]
                },
                {
                    url: 'images/port_haven.jpg',
                    regions: []
                }
            ];

            renderMap(0);
            alert('Using fallback map data (check console for details)');
        }
    }

    function renderMap(level) {
        currentLevel = level;
        const mapData = maps[level];

        if (!mapData) {
            console.error('No map data for level', level);
            return;
        }

        svg.innerHTML = '';

        // Background image
        const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', mapData.url);
        img.setAttribute('x', '0');
        img.setAttribute('y', '0');
        img.setAttribute('width', '600');
        img.setAttribute('height', '800');
        svg.appendChild(img);

        // Clickable polygon regions
        (mapData.regions || []).forEach(region => {
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', region.points);
            poly.addEventListener('click', () => {
                if (typeof region.nextLevel === 'number' && region.nextLevel < maps.length) {
                    renderMap(region.nextLevel);
                }
            });
            svg.appendChild(poly);
        });

        // Show/hide back button
        backButton.style.display = (level > 0) ? 'block' : 'none';
    }

    function goBack() {
        if (currentLevel > 0) {
            renderMap(currentLevel - 1);
        }
    }

    // Wire up the back button
    backButton.addEventListener('click', goBack);

    // Load data when page is ready
    window.addEventListener('DOMContentLoaded', loadMapData);
</script>
</body>
</html>
