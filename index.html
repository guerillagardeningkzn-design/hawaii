<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hawaii Zoomable Map</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #0a3d62; /* Ocean blue – fills dead space */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 540px;
            max-height: 960px;
            background-color: #0a3d62;
            border: 12px solid #0a3d62;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        polygon {
            fill: transparent;
            stroke: rgba(255, 60, 60, 0.7);
            stroke-width: 3;
            cursor: pointer;
            transition: fill 0.2s;
        }
        polygon:hover {
            fill: rgba(255, 60, 60, 0.15);
        }
        #back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            padding: 12px 24px;
            background-color: rgba(0, 123, 255, 0.85);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: none;
        }
        #back-button:hover {
            background-color: rgba(0, 86, 179, 0.95);
        }
    </style>
</head>
<body>
    <div id="map-container">
        <button id="back-button">Back</button>
        <svg id="map-svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <script>
    let maps = [];
    let currentLevel = 0;
    let history = [];           // Stack of previous levels for proper back navigation
    let isGoingBack = false;    // Flag to distinguish forward vs backward moves

    const svg = document.getElementById('map-svg');
    const backButton = document.getElementById('back-button');

    // REPLACE THIS WITH YOUR ACTUAL APPS SCRIPT WEB APP URL
    const apiUrl = 'https://script.google.com/macros/s/AKfycbygjXQ023r358utfU_3UhVQDDN3vOWnahjY_Gs6mpubRbs5l-oZECpy7pt0lUPWpvLK/exec';

    async function loadMapData() {
        try {
            const response = await fetch(apiUrl, {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache',
                redirect: 'follow'
            });

            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            maps = await response.json();

            if (!Array.isArray(maps) || maps.length === 0) {
                throw new Error('Invalid map data format');
            }

            renderMap(0);
        } catch (error) {
            console.error('Failed to load map data from Google Sheets:', error);

            // Fallback hardcoded data (includes example objects & deeper levels)
            maps = [
                {
                    url: 'images/island_map.jpg',
                    regions: [
                        { points: '80,520 520,520 520,760 320,800 80,720', nextLevel: 1 }
                    ],
                    objects: []
                },
                {
                    url: 'images/gulf_coast.jpg',
                    regions: [
                        { points: '180,420 420,420 420,620 320,670 180,620', nextLevel: 2 },
                        { points: '300,100 500,100 500,300 300,300', nextLevel: 3 }
                    ],
                    objects: [
                        { type: 'marker', points: '250,450', properties: { name: 'Inn', desc: 'Rest here', action: 'heal' } },
                        { type: 'collectible', points: '380,620', properties: { name: 'Pearl', value: 100 } }
                    ]
                },
                {
                    url: 'images/port_haven.jpg',
                    regions: [],
                    objects: []
                },
                {
                    url: 'images/volcano_peak.jpg',
                    regions: [],
                    objects: [
                        { type: 'marker', points: '400,300', properties: { name: 'Volcano Spirit', dialog: 'Beware!' } }
                    ]
                }
            ];

            renderMap(0);
            alert('Using fallback map data – check console for details');
        }
    }

    function renderMap(level) {
        // Only push to history when moving forward (not when going back)
        if (!isGoingBack && level !== currentLevel) {
            history.push(currentLevel);
        }

        // Reset the flag after it's been used
        isGoingBack = false;

        // Clear history when we reach the top level
        if (level === 0) {
            history = [];
        }

        currentLevel = level;
        const mapData = maps[level];

        if (!mapData) {
            console.error('No map data for level', level);
            return;
        }

        svg.innerHTML = '';

        // Background image
        const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', mapData.url);
        img.setAttribute('x', '0');
        img.setAttribute('y', '0');
        img.setAttribute('width', '600');
        img.setAttribute('height', '800');
        svg.appendChild(img);

        // Clickable zoom regions (polygons)
        (mapData.regions || []).forEach(region => {
            const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            poly.setAttribute('points', region.points);
            poly.addEventListener('click', () => {
                if (typeof region.nextLevel === 'number' && region.nextLevel < maps.length) {
                    renderMap(region.nextLevel);
                }
            });
            svg.appendChild(poly);
        });

        // Interactive objects / markers
        (mapData.objects || []).forEach(obj => {
  if (obj.type === 'marker') {
    // Safety check: skip if points is missing or not a valid string
    if (typeof obj.points !== 'string' || !obj.points.includes(',')) {
      console.warn('Skipping invalid marker – missing or bad points:', obj);
      return;
    }

    const parts = obj.points.split(',');
    if (parts.length !== 2) {
      console.warn('Skipping marker – invalid points format:', obj.points);
      return;
    }

    const cx = parseFloat(parts[0]);
    const cy = parseFloat(parts[1]);

    if (isNaN(cx) || isNaN(cy)) {
      console.warn('Skipping marker – invalid coordinates:', obj.points);
      return;
    }

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', '12');
    circle.setAttribute('fill', 'gold');
    circle.setAttribute('stroke', 'black');
    circle.setAttribute('stroke-width', '2');

    circle.addEventListener('click', () => {
      alert(`Clicked: ${obj.properties?.name || 'Marker'}\n${obj.properties?.desc || obj.properties?.dialog || ''}`);
    });

    svg.appendChild(circle);
  }
  // Add future types here...
});

        // Show/hide back button based on history
        backButton.style.display = (history.length > 0) ? 'block' : 'none';
    }

    function goBack() {
        if (history.length > 0) {
            isGoingBack = true;  // Prevent history push during backward render
            const previousLevel = history.pop();
            renderMap(previousLevel);
        }
    }

    backButton.addEventListener('click', goBack);

    // Load data when the page is ready
    window.addEventListener('DOMContentLoaded', loadMapData);
</script>
</body>
</html>
